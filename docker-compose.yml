version: '3.8'

services:
  # Backend service (Bun + Discord bot + REST API + WebSocket)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sabbylink-backend
    restart: unless-stopped
    environment:
      # Discord
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      
      # Backend
      - BACKEND_PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=/data/sabbylink.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      # AI Providers
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-sonnet-20240229}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - GOOGLE_AI_MODEL=${GOOGLE_AI_MODEL:-gemini-pro}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-mixtral-8x7b-32768}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama2}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-3-opus}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - PERPLEXITY_MODEL=${PERPLEXITY_MODEL:-pplx-70b-online}
      - CUSTOM_AI_URL=${CUSTOM_AI_URL:-}
      - CUSTOM_AI_API_KEY=${CUSTOM_AI_API_KEY:-}
      - CUSTOM_AI_MODEL=${CUSTOM_AI_MODEL:-}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-openai}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-1000}
      - AI_SYSTEM_PROMPT=${AI_SYSTEM_PROMPT:-You are a helpful AI assistant integrated into a Discord selfbot.}
      
      # Rate Limiting
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      
      # Feature Toggles
      - ENABLE_RPC=${ENABLE_RPC:-true}
      - ENABLE_AI_RESPONDER=${ENABLE_AI_RESPONDER:-false}
      - ENABLE_NITRO_SNIPER=${ENABLE_NITRO_SNIPER:-false}
      - ENABLE_GIVEAWAY_JOINER=${ENABLE_GIVEAWAY_JOINER:-false}
      - ENABLE_MESSAGE_LOGGER=${ENABLE_MESSAGE_LOGGER:-true}
      - ENABLE_AUTO_REACTIONS=${ENABLE_AUTO_REACTIONS:-false}
      - ENABLE_AFK_SYSTEM=${ENABLE_AFK_SYSTEM:-true}
      
      # RPC
      - RPC_PLATFORM=${RPC_PLATFORM:-pc}
      - RPC_ANIMATION_ENABLED=${RPC_ANIMATION_ENABLED:-false}
      - RPC_ANIMATION_INTERVAL=${RPC_ANIMATION_INTERVAL:-30}
      
      # Backup
      - AUTO_BACKUP_ENABLED=${AUTO_BACKUP_ENABLED:-true}
      - AUTO_BACKUP_INTERVAL_HOURS=${AUTO_BACKUP_INTERVAL_HOURS:-24}
      - AUTO_BACKUP_MAX_BACKUPS=${AUTO_BACKUP_MAX_BACKUPS:-7}
      - BACKUP_DIR=/backups
      
      # Security
      - ENABLE_RATE_LIMITING=${ENABLE_RATE_LIMITING:-true}
      - MAX_LOGIN_ATTEMPTS=${MAX_LOGIN_ATTEMPTS:-5}
      - ACCOUNT_LOCK_DURATION_MINUTES=${ACCOUNT_LOCK_DURATION_MINUTES:-30}
      - SESSION_TIMEOUT_HOURS=${SESSION_TIMEOUT_HOURS:-24}
      
      # Analytics
      - ENABLE_ANALYTICS=${ENABLE_ANALYTICS:-true}
      - ANALYTICS_RETENTION_DAYS=${ANALYTICS_RETENTION_DAYS:-30}
      
      # Advanced
      - WS_PING_INTERVAL=${WS_PING_INTERVAL:-30}
      - WS_CONNECTION_TIMEOUT=${WS_CONNECTION_TIMEOUT:-60}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
      - ENABLE_EXPERIMENTAL_FEATURES=${ENABLE_EXPERIMENTAL_FEATURES:-false}
    
    volumes:
      # Persistent data (SQLite database)
      - sabbylink-data:/data
      
      # Backups
      - sabbylink-backups:/backups
      
      # Logs
      - sabbylink-logs:/app/logs
    
    networks:
      - sabbylink-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (adjust based on your VPS)
    deploy:
      resources:
        limits:
          memory: 150M
          cpus: '0.5'
        reservations:
          memory: 100M
          cpus: '0.25'

  # Frontend service (React SPA served as static files)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:3000
        - VITE_WS_URL=ws://backend:3000
    container_name: sabbylink-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sabbylink-network
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 50M
          cpus: '0.1'
        reservations:
          memory: 30M
          cpus: '0.05'

  # Caddy reverse proxy (HTTPS + auto certificates)
  caddy:
    image: caddy:2-alpine
    container_name: sabbylink-caddy
    restart: unless-stopped
    ports:
      # HTTP
      - "80:80"
      # HTTPS
      - "443:443"
      # HTTP/3
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      # Caddy configuration
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      
      # Caddy data (certificates, etc.)
      - caddy-data:/data
      
      # Caddy config (auto-generated)
      - caddy-config:/config
    
    depends_on:
      - backend
      - frontend
    
    networks:
      - sabbylink-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 50M
          cpus: '0.1'
        reservations:
          memory: 30M
          cpus: '0.05'

  # Optional: Ollama service (for local AI models)
  # Uncomment this if you want to run Ollama locally
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: sabbylink-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   networks:
  #     - sabbylink-network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 2G
  #         cpus: '1.0'

# Networks
networks:
  sabbylink-network:
    driver: bridge
    name: sabbylink-network

# Volumes (persistent data)
volumes:
  # SQLite database
  sabbylink-data:
    name: sabbylink-data
    driver: local
  
  # Backups
  sabbylink-backups:
    name: sabbylink-backups
    driver: local
  
  # Logs
  sabbylink-logs:
    name: sabbylink-logs
    driver: local
  
  # Caddy data (certificates)
  caddy-data:
    name: sabbylink-caddy-data
    driver: local
  
  # Caddy config
  caddy-config:
    name: sabbylink-caddy-config
    driver: local
  
  # Ollama data (if enabled)
  # ollama-data:
  #   name: sabbylink-ollama-data
  #   driver: local
